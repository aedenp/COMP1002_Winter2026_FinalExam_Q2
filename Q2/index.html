<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Workshop Registration</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 2rem auto; padding: 1rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        label { font-weight: bold; }
        input, select, button { padding: 0.5rem; font-size: 1rem; }
        button { background-color: #450; color: rgb(255, 159, 25); border: none; cursor: pointer; }
        button:hover { background-color: #450; }
        #message { margin-top: 1.5rem; padding: 1rem; border-radius: 5px; background: #e9ecef; }
    </style>
</head>
<body>
    <h1>Tech Workshop Registration</h1>

    <form id="registrationForm">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <label for="level">Experience Level:</label>
        <select id="level" name="level" required>
            <option value="">-- Select --</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
        </select>

        <button type="submit">Register</button>
    </form>

    <div id="message"></div>

    <script src="script.js"></script>
</body>
</html>
